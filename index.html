<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aissa Dingenotto Portfolio</title>
  <link rel="icon" type="image/svg+xml" href="./magpie.svg" />
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #222;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
    }

    @supports (min-height: 100dvh) {
      body {
        min-height: 100dvh;
      }
    }

    .pdf-frame {
      width: 100%;
      height: 100vh;
      border: 0;
      display: block;
    }

    @supports (height: 100dvh) {
      .pdf-frame {
        height: 100dvh;
      }
    }

    @media (max-width: 768px) {
      .pdf-frame {
        display: none;
      }
    }
  </style>
</head>
<body>
  <!-- update this to new pdf filename when you need to update whats displayed on the website -->
  <iframe
  class="pdf-frame"
  src="./Aissa_Portfolio_QR.pdf"
  title="Portfolio PDF">
</iframe>
  <script>
    if (window.matchMedia("(max-width: 768px)").matches) {
      window.location.replace("./Aissa_Portfolio_QR.pdf");
    }
  </script>
</body>
</html>
